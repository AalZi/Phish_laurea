<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laurea IDM</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 14px;
      color: #333;
      background: #fff;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 32px;
      border-bottom: 1px solid #e0e0e0;
    }

    .logo-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #009fae;
      color: #fff;
      font-weight: 900;
      font-size: 22px;
      line-height: 1.1;
      width: 56px;
      height: 56px;
      text-decoration: none;
      letter-spacing: 0.5px;
    }

    .lang-switcher {
      display: flex;
      gap: 12px;
      list-style: none;
      font-size: 13px;
    }

    .lang-switcher a {
      color: #0078d4;
      text-decoration: none;
    }

    .lang-switcher a:hover { text-decoration: underline; }

    /* Main content */
    .main {
      display: flex;
      padding: 48px 32px;
      gap: 0;
      max-width: 900px;
    }

    .welcome-section {
      flex: 1;
      padding-right: 48px;
      border-right: 1px solid #e0e0e0;
    }

    .welcome-section h1 {
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 16px;
      color: #1a1a1a;
    }

    .welcome-section p {
      color: #555;
      line-height: 1.5;
    }

    .signin-section {
      flex: 1;
      padding-left: 48px;
    }

    .signin-section h2 {
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .signin-section > p {
      color: #555;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .btn-provider {
      display: block;
      width: 220px;
      padding: 10px 16px;
      margin-bottom: 10px;
      background: #0078d4;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
    }

    .btn-provider:hover { background: #005fa3; }

    footer {
      padding: 24px 32px;
      font-size: 12px;
      color: #888;
    }

    footer a { color: #0078d4; }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="#" class="logo-box">LAU<br>REA</a>
    <ul class="lang-switcher">
      <li><a href="#">Suomeksi</a></li>
      <li><a href="#">In English</a></li>
    </ul>
  </div>

  <div class="main">
    <div class="welcome-section">
      <h1>Welcome</h1>
      <p>The service that you are trying to access, https://iam.laurea.fi, requires you to sign in.</p>
    </div>

    <div class="signin-section">
      <h2>Choose your sign-in method</h2>
      <p>You can sign in using an authentication provider.</p>

      <button class="btn-provider" onclick="location.href='#'">Suomi.fi - Employee</button>
      <button class="btn-provider" onclick="location.href='login.html'">Sign-in using your Laurea ID</button>
      <button class="btn-provider" onclick="location.href='#'">Suomi.fi - Student</button>
    </div>
  </div>

  <footer>
    <a href="#">Accessibility report</a>
  </footer>

</body>
</html>
